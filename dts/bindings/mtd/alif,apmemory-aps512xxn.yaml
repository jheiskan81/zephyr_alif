description: AP-Memory PSRAM on ALIF Hex-SPI(DW-SSI) bus

compatible: "alif,apmemory-aps512xxn"

include: base.yaml

properties:
  size:
    type: int
    required: true
    description: |
      The RAM size in bytes.

  x16-data-transfer-mode:
    type: boolean
    description: |
      Enable 16 Data lines transfer mode. This is only available for Data Transfer.
      Default is 8 Data lines transfer mode.

  latency-code:
    type: int
    enum:
      - 3
      - 4
      - 5
      - 6
      - 7
    required: true
    description: |
       The RAM wait cycle value for read/write operations depends on the operating frequency
       of the OSPI interface. The latency value should be selected according to the input clock
       frequency to ensure reliable operation.
       | Latency code | Max CLK (MHz) |
       | ------------ | ------------- |
       | 3            | 66            |
       | 4            | 109           |
       | 5            | 133           |
       | 6            | 166           |
       | 7            | 200           |
