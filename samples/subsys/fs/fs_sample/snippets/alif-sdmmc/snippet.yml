name: alif-sdmmc
append:
  EXTRA_CONF_FILE: alif-sdmmc.conf

boards:
  # B1 Balletto and E1C boards (gpio6 for cd, gpio7 for reset)
  /(alif_b1|alif_e1c).*/.*/rtss_he/:
    append:
      EXTRA_DTC_OVERLAY_FILE: alif_balletto_e1c_dk.overlay

  # E7 Ensemble boards (gpio3 for cd, no reset gpio)
  /(alif_e7).*/.*/rtss_(hp|he)/:
    append:
      EXTRA_DTC_OVERLAY_FILE: alif_ensemble_e7_dk.overlay

  # E8 Ensemble boards (gpio3 for cd, gpio14 for reset)
  /(alif_e8).*/.*/rtss_(hp|he)/:
    append:
      EXTRA_DTC_OVERLAY_FILE: alif_ensemble_e8_dk.overlay
      EXTRA_CONF_FILE: alif_ensemble_e8_dk.conf
