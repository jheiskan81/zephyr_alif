# Debug
CONFIG_LOG_PRINTK=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_NO_OPTIMIZATIONS=y

# Serial
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=128
CONFIG_EARLY_CONSOLE=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=5120
CONFIG_SHELL_STACK_SIZE=5120
CONFIG_NET_TX_STACK_SIZE=5120
CONFIG_NET_RX_STACK_SIZE=5120
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=5120
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=2048
CONFIG_NET_TCP_WORKQ_STACK_SIZE=4096

# Network overrides for WiFi offload
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_PKT_RX_COUNT=40
CONFIG_NET_PKT_TX_COUNT=40
CONFIG_NET_BUF_RX_COUNT=80
CONFIG_NET_BUF_TX_COUNT=80
CONFIG_NET_BUF_DATA_SIZE=1024
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_MAX_CONN=16
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=32768
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=32768
CONFIG_NET_OFFLOAD=y
CONFIG_WIFI_OFFLOAD=y
CONFIG_ZVFS_POLL_MAX=16

CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_NET_L2_WIFI_SHELL=y

# Wi-Fi
CONFIG_WIFI=y
CONFIG_WIFI_AIROC=y
CONFIG_CYW55500=y
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_KERNEL_MEM_POOL=y

# SDIO
CONFIG_SDIO_STACK=y

# SDHC
CONFIG_SD_UHS_PROTOCOL=y
CONFIG_SDHC_RSP_136_HAS_CRC=y
CONFIG_PLATFORM_SPECIFIC_INIT=y
CONFIG_SDHC_DWC=y
CONFIG_SDHC_INIT_PRIORITY=1
